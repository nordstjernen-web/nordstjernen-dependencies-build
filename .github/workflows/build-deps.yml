name: build-deps

# Cross-compile the full native third-party dependency stack for every Android
# ABI and publish each as a downloadable "android sysroot" artifact that
# nordstjernen's android/scripts/build-deps.sh (and local devs) can consume
# instead of compiling everything from source.

on:
  workflow_dispatch:
  push:
    paths:
      - 'android/deps/**'
      - 'android/scripts/**'
      - 'android/cross/**'
      - '.github/workflows/build-deps.yml'
  schedule:
    # Nightly rebuild (04:17 UTC) to catch toolchain/runner drift.
    - cron: '17 4 * * *'

permissions:
  contents: read

concurrency:
  group: build-deps-${{ github.ref }}
  cancel-in-progress: true

env:
  NDK_VERSION: '27.3.13750724'
  ANDROID_API: '35'
  NORDSTJERNEN_ANDROID_VERBOSE: '1'

jobs:
  build:
    name: ${{ matrix.abi }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        abi: [arm64-v8a, armeabi-v7a, x86_64, x86]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build pkg-config \
            autoconf automake libtool gettext gperf ccache \
            bison flex texinfo
          # Recent Meson/Ninja from PyPI (Ubuntu's are often too old for glib).
          python -m pip install --upgrade pip
          python -m pip install 'meson>=1.5.0' ninja
          echo "meson $(meson --version), ninja $(ninja --version), cmake $(cmake --version | head -1)"

      - name: Install Android NDK ${{ env.NDK_VERSION }}
        run: |
          set -euo pipefail
          SDK="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          SDKMANAGER="${SDK}/cmdline-tools/latest/bin/sdkmanager"
          # `yes | sdkmanager` races: sdkmanager closes the pipe early, so `yes`
          # dies with a broken pipe and trips `pipefail`. Guard both calls with
          # `|| true` and use the install-dir check below as the real gate.
          (yes 2>/dev/null | "${SDKMANAGER}" --licenses >/dev/null 2>&1) || true
          (yes 2>/dev/null | "${SDKMANAGER}" "ndk;${NDK_VERSION}" >/dev/null 2>&1) || true
          NDK_HOME="${SDK}/ndk/${NDK_VERSION}"
          test -d "${NDK_HOME}" || { echo "::error::NDK ${NDK_VERSION} install failed"; exit 1; }
          echo "ANDROID_NDK_HOME=${NDK_HOME}" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=${NDK_HOME}" >> "$GITHUB_ENV"
          echo "Installed NDK at ${NDK_HOME}"

      - name: Cache source tarballs
        uses: actions/cache@v5
        with:
          path: android/.cache/tarballs
          key: deps-tarballs-${{ hashFiles('android/deps/manifest.txt') }}
          restore-keys: |
            deps-tarballs-

      - name: Cache ccache
        uses: actions/cache@v5
        # ccache only speeds up *reruns*; a clean build (the common case here)
        # leans on the parallel source prefetch in build-android-deps.sh instead.
        with:
          path: android/.cache/ccache
          key: deps-ccache-${{ matrix.abi }}-${{ hashFiles('android/deps/manifest.txt') }}-${{ github.sha }}
          restore-keys: |
            deps-ccache-${{ matrix.abi }}-${{ hashFiles('android/deps/manifest.txt') }}-
            deps-ccache-${{ matrix.abi }}-

      - name: Build dependency sysroot (${{ matrix.abi }})
        env:
          NORDSTJERNEN_ANDROID_SYSROOT: ${{ github.workspace }}/sysroot
        run: |
          set -euxo pipefail
          chmod +x android/scripts/*.sh
          android/scripts/build-android-deps.sh "${{ matrix.abi }}"

      - name: Upload build logs (${{ matrix.abi }})
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: nordstjernen-android-build-logs-${{ matrix.abi }}
          path: |
            android/cross/*.cross
            android/.build/${{ matrix.abi }}/**/*.log
            android/.build/${{ matrix.abi }}/**/meson-logs/**
            android/.build/${{ matrix.abi }}/**/CMakeFiles/CMake*.yaml
            android/.build/${{ matrix.abi }}/**/CMakeFiles/CMake*.log
          if-no-files-found: ignore
          retention-days: 14

      - name: Sanity-check artifact contents
        env:
          NORDSTJERNEN_ANDROID_SYSROOT: ${{ github.workspace }}/sysroot
        run: |
          set -euo pipefail
          PREFIX="${NORDSTJERNEN_ANDROID_SYSROOT}/${{ matrix.abi }}"
          echo "== shared libraries =="; ls -1 "${PREFIX}/lib/"*.so
          echo "== pkg-config modules =="; ls -1 "${PREFIX}/lib/pkgconfig/"*.pc
          # Every key module must be discoverable via pkg-config.
          export PKG_CONFIG_LIBDIR="${PREFIX}/lib/pkgconfig"
          for m in zlib libffi libpcre2-8 expat gobject-2.0 gio-2.0 \
                   freetype2 libpng harfbuzz fontconfig pixman-1 fribidi \
                   cairo pango pangocairo libcrypto libssl libnghttp2 \
                   libbrotlidec libbrotlienc libbrotlicommon \
                   libcurl sqlite3 uchardet libpsl libwebp; do
            pkg-config --exists "$m" && echo "ok   $m $(pkg-config --modversion "$m")" \
                                     || { echo "MISSING $m"; exit 1; }
          done
          # llama.cpp / ggml ship CMake config rather than pkg-config, so check
          # for the shared libraries directly.
          for so in libllama.so libggml.so libggml-base.so; do
            test -f "${PREFIX}/lib/${so}" && echo "ok   ${so}" \
                                          || { echo "MISSING ${so}"; exit 1; }
          done
          # Confirm libcurl actually linked brotli (decodes `Content-Encoding: br`).
          if command -v readelf >/dev/null; then
            if readelf -dW "${PREFIX}/lib/libcurl.so" | grep -q 'libbrotlidec'; then
              echo "ok   libcurl.so links libbrotlidec (brotli enabled)"
            else
              echo "::error::libcurl.so does not link libbrotlidec"; exit 1
            fi
            # Verify the 16 KB page-size flag took effect on a representative lib.
            readelf -lW "${PREFIX}/lib/libcurl.so" | grep -q 'LOAD' && \
              echo "libcurl.so program headers present"
          fi

      - name: Stage artifact tree
        env:
          NORDSTJERNEN_ANDROID_SYSROOT: ${{ github.workspace }}/sysroot
        run: |
          set -euo pipefail
          OUT="${{ github.workspace }}/artifact"
          mkdir -p "${OUT}"
          cp -a "${NORDSTJERNEN_ANDROID_SYSROOT}/${{ matrix.abi }}" "${OUT}/"
          cp android/deps/manifest.txt "${OUT}/${{ matrix.abi }}/MANIFEST.txt"
          {
            echo "abi=${{ matrix.abi }}"
            echo "ndk=${NDK_VERSION}"
            echo "api=${ANDROID_API}"
            echo "commit=${{ github.sha }}"
            echo "built=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } > "${OUT}/${{ matrix.abi }}/BUILDINFO.txt"

      - name: Upload sysroot artifact
        uses: actions/upload-artifact@v7
        with:
          name: nordstjernen-android-sysroot-${{ matrix.abi }}
          # Upload the parent dir so the artifact keeps a top-level <abi>/
          # directory (include/, lib/, lib/pkgconfig/) for build-deps.sh.
          path: artifact/
          if-no-files-found: error
          retention-days: 90

  # Aggregate all four ABIs into a single public GitHub Release so the sysroots
  # are downloadable with plain curl (no auth, no artifact expiry). Runs only
  # when all matrix builds succeed, and only on main / manual / scheduled runs.
  publish:
    name: publish-release
    needs: build
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download all sysroot artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: nordstjernen-android-sysroot-*
          path: artifacts

      - name: Package per-ABI tarballs and checksums
        run: |
          set -euo pipefail
          mkdir -p dist
          for abi in arm64-v8a armeabi-v7a x86_64 x86; do
            d="artifacts/nordstjernen-android-sysroot-${abi}"
            test -d "${d}/${abi}" || { echo "::error::missing sysroot for ${abi}"; exit 1; }
            # Tarball keeps a top-level <abi>/ dir so it extracts directly into
            # $NORDSTJERNEN_ANDROID_SYSROOT.
            tar -C "${d}" -czf "dist/nordstjernen-android-sysroot-${abi}.tar.gz" "${abi}"
          done
          cp android/deps/manifest.txt dist/manifest.txt
          ( cd dist && sha256sum ./*.tar.gz manifest.txt > SHA256SUMS )
          echo "== release assets =="; ls -lh dist

      - name: Publish rolling 'sysroot-latest' release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: sysroot-latest
          name: Android prebuilt sysroot (latest)
          body: |
            Prebuilt Android dependency sysroot for the Nordstjernen engine.

            - NDK: `${{ env.NDK_VERSION }}`  ·  API/minSdk: `${{ env.ANDROID_API }}`
            - ABIs: arm64-v8a, armeabi-v7a, x86_64, x86 (16 KB page size)
            - Source commit: `${{ github.sha }}`
            - Pinned versions: see `manifest.txt`; checksums in `SHA256SUMS`.

            Consume with:
            ```bash
            export NORDSTJERNEN_ANDROID_SYSROOT="$HOME/.cache/nordstjernen-android-sysroot"
            android/scripts/fetch-prebuilt-deps.sh --sysroot "$NORDSTJERNEN_ANDROID_SYSROOT"
            ```
          files: |
            dist/nordstjernen-android-sysroot-*.tar.gz
            dist/SHA256SUMS
            dist/manifest.txt
          fail_on_unmatched_files: true
